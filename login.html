<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - dtcpay CS Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0066ff 0%, #0047b3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-bottom: 60px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }

        .login-logo {
            position: absolute;
            top: 32px;
            left: 32px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            z-index: 10;
        }

        .login-logo img {
            height: 40px;
            width: auto;
        }

        .login-logo-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .login-logo-title {
            font-size: 20px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
        }

        .login-logo-subtitle {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            padding: 48px 48px 40px 48px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0066ff 0%, #0047b3 100%);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0, 102, 255, 0.3);
        }

        .login-icon i {
            width: 40px;
            height: 40px;
            color: white;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 16px;
            color: #6B7280;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label i {
            width: 16px;
            height: 16px;
            color: #0066ff;
        }

        .form-input {
            padding: 14px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 15px;
            color: #111827;
            background: white;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .form-input::placeholder {
            color: #9CA3AF;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: -8px 0;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0066ff;
        }

        .remember-me label {
            font-size: 14px;
            color: #6B7280;
            cursor: pointer;
            user-select: none;
        }

        .forgot-password {
            font-size: 14px;
            color: #0066ff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #0047b3;
        }

        .login-button {
            padding: 16px;
            background: linear-gradient(135deg, #0066ff 0%, #0047b3 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 102, 255, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button i {
            width: 20px;
            height: 20px;
        }

        .login-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 8px 0;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #E5E7EB;
        }

        .login-divider span {
            padding: 0 16px;
            color: #9CA3AF;
            font-size: 13px;
            font-weight: 500;
        }

        .security-badge {
            margin-top: 32px;
            padding: 20px;
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .security-badge i {
            width: 24px;
            height: 24px;
            color: #10B981;
            flex-shrink: 0;
        }

        .security-badge-text {
            font-size: 13px;
            color: #6B7280;
            line-height: 1.5;
        }

        .security-badge-text strong {
            color: #10B981;
            font-weight: 600;
        }

        .login-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            z-index: 1;
        }

        .error-message {
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #991B1B;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            width: 18px;
            height: 18px;
            color: #EF4444;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .login-logo {
                position: static;
                margin-bottom: 32px;
                align-items: center;
                text-align: center;
            }

            .login-card {
                padding: 32px 24px;
                max-width: 100%;
            }

            .login-title {
                font-size: 28px;
            }

            .login-subtitle {
                font-size: 14px;
            }

            .form-options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .login-footer {
                position: static;
                margin-top: 24px;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 20px;
            }

            .login-title {
                font-size: 24px;
            }

            .login-icon {
                width: 64px;
                height: 64px;
            }

            .login-icon i {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="https://dtcpay.com/wp-content/themes/dtc/frontend/resources/img/dtc-logo.svg" alt="dtcpay" onerror="this.style.display='none'">
            <div class="login-logo-text">
                <div class="login-logo-title">TOP 2.0</div>
                <div class="login-logo-subtitle">CS Portal</div>
            </div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i data-feather="shield"></i>
                </div>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to access the CS Portal</p>
            </div>

            <div class="error-message" id="errorMessage">
                <i data-feather="alert-circle"></i>
                <span id="errorText"></span>
            </div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i data-feather="user"></i>
                        Username or Email
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-input"
                        placeholder="Enter your username or email"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i data-feather="lock"></i>
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password" onclick="alert('Please contact your system administrator to reset your password.'); return false;">Forgot password?</a>
                </div>

                <button type="submit" class="login-button">
                    <span>Sign In</span>
                    <i data-feather="arrow-right"></i>
                </button>

                <div class="login-divider">
                    <span>Secure Authentication</span>
                </div>

                <div class="security-badge">
                    <i data-feather="shield-check"></i>
                    <div class="security-badge-text">
                        <strong>Secure Login:</strong> All credentials are encrypted and transmitted securely. This portal is for authorized CS agents only.
                    </div>
                </div>
            </form>
        </div>

        <div class="login-footer">
            &copy; 2025 dtcpay. All rights reserved. | CS Portal v2.0
        </div>
    </div>

    <script>
        // Initialize Feather Icons
        feather.replace();

        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // Clear previous error
            errorMessage.classList.remove('show');

            // Simple validation (in production, this would connect to a real authentication API)
            if (!username || !password) {
                showError('Please enter both username and password.');
                return;
            }

            // Demo authentication - accept any username/password for now
            // In production, this would be replaced with actual API authentication
            if (username && password) {
                // Store authentication token/session
                sessionStorage.setItem('authenticated', 'true');
                sessionStorage.setItem('username', username);

                if (rememberMe) {
                    localStorage.setItem('rememberedUser', username);
                }

                // Show success and redirect
                showSuccess();

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
            } else {
                showError('Invalid username or password.');
            }
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            errorText.textContent = message;
            errorMessage.classList.add('show');

            // Refresh feather icons
            feather.replace();
        }

        function showSuccess() {
            const loginButton = document.querySelector('.login-button');
            loginButton.innerHTML = '<i data-feather="check"></i><span>Success! Redirecting...</span>';
            loginButton.style.background = '#10B981';
            feather.replace();
        }

        // Pre-fill username if remembered
        window.addEventListener('DOMContentLoaded', function() {
            const rememberedUser = localStorage.getItem('rememberedUser');
            if (rememberedUser) {
                document.getElementById('username').value = rememberedUser;
                document.getElementById('rememberMe').checked = true;
            }

            // Focus on the first empty field
            if (rememberedUser) {
                document.getElementById('password').focus();
            } else {
                document.getElementById('username').focus();
            }
        });

        // Handle Enter key on form inputs
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
