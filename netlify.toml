# Netlify configuration for dtcpay CS Portal

# Redirect root to login page
[[redirects]]
  from = "/"
  to = "/login.html"
  status = 200

# Redirect /index.html to login if not authenticated
# (This will be handled by JavaScript in the page itself)

# Ensure all HTML pages are served correctly
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
